<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune Cookieee</title>
    <style>
        :root {
            --bg-color: #fcf8f2;
            --card-bg: #ffffff;
            --text-main: #33231a;
            --text-sub: #7a685d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #game-card {
            background: var(--card-bg);
            padding: 40px 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(138, 91, 56, 0.08);
            width: 90%;
            max-width: 380px;
            box-sizing: border-box;
            text-align: center;
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        #instruction {
            color: var(--text-sub);
            font-size: 14px;
            margin-bottom: 35px;
            font-weight: 500;
            min-height: 20px;
        }

        /* --- COOKIE WRAPPER --- */
        #cookie-wrapper {
            width: 140px;
            height: 120px;
            margin: 0 auto 30px auto;
            position: relative;
            cursor: pointer;
            user-select: none;
        }

        /* Continuous gentle floating movement */
        .wobble {
            animation: floatWobble 2.5s ease-in-out infinite;
        }

        @keyframes floatWobble {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* Base halves using clip-path to slice the emoji horizontally */
        .cookie-half {
            position: absolute;
            left: 0;
            top: 0;
            width: 140px;
            height: 120px;
            font-size: 90px;
            line-height: 120px;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
        }

        #top-half {
            clip-path: inset(0 0 50% 0); /* Shows only top 50% */
            transform-origin: center 25%;
        }

        #bottom-half {
            clip-path: inset(50% 0 0 0); /* Shows only bottom 50% */
            transform-origin: center 75%;
        }

        /* Horizontal Splitting Action */
        .split-top {
            transform: translateY(-50px) rotate(-10deg);
            opacity: 0;
        }

        .split-bottom {
            transform: translateY(50px) rotate(10deg);
            opacity: 0;
        }

        /* --- THE FORTUNE SLIP --- */
        #paper-fortune {
            width: 90%;
            background: #ffffff;
            border-top: 2px dashed #e74c3c;
            border-bottom: 2px dashed #e74c3c;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            padding: 25px 18px;
            box-sizing: border-box;
            margin: 0 auto;
            display: none;
            text-align: center;
            opacity: 0;
            transform: translateY(20px) scale(0.9);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #fortune-text {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.5;
            color: #c0392b;
            margin: 0 0 8px 0;
        }

        .fortune-subtext {
            font-size: 11px;
            color: #7f8c8d;
            letter-spacing: 0.5px;
        }

        /* --- RESTART ACTION BUTTON --- */
        #reset-btn {
            background-color: var(--text-main);
            color: white;
            border: none;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 30px;
            display: none;
            opacity: 0;
            transition: all 0.3s ease;
        }
        #reset-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div id="game-card">
    <h2>Lucky Cookie</h2>
    <div id="instruction">Tap the cookie to crack it open...</div>

    <!-- Wrapper hosting split twin components -->
    <div id="cookie-wrapper" class="wobble" onclick="crackCookie()">
        <div class="cookie-half" id="top-half">🥠</div>
        <div class="cookie-half" id="bottom-half">🥠</div>
    </div>

    <!-- Paper Fortune Container -->
    <div id="paper-fortune">
        <div id="fortune-text"></div>
        <div class="fortune-subtext">Lucky Numbers: 311, 4, 1114, 46</div>
    </div>

    <button id="reset-btn" onclick="resetCookie()">Get Another Cookie</button>
</div>

<script>
    let isCracked = false;

    function crackCookie() {
        if (isCracked) return;
        isCracked = true;

        const wrapper = document.getElementById('cookie-wrapper');
        const topHalf = document.getElementById('top-half');
        const bottomHalf = document.getElementById('bottom-half');
        const paper = document.getElementById('paper-fortune');
        const instruction = document.getElementById('instruction');
        const resetBtn = document.getElementById('reset-btn');

        // Stop floating, activate physical split
        wrapper.classList.remove('wobble');
        topHalf.classList.add('split-top');
        bottomHalf.classList.add('split-bottom');
        instruction.innerText = "Your morning fortune:";

        setTimeout(() => {
            const fortunes = [
                "I love you Monkey 💗 ",
                "Have an amazing day today! I love youuu!",
                "Roses are red, violets are blue, you have to look at a laptop all day, but at least you're super cute 😉",
                "You're my favoritest person in the whole world. Have an amazing day bubbas!"
            ];
            
            const randomFortune = fortunes[Math.floor(Math.random() * fortunes.length)];
            document.getElementById('fortune-text').innerText = randomFortune;

            // Swap displays cleanly
            wrapper.style.display = 'none';
            paper.style.display = 'block';
            
            setTimeout(() => {
                paper.style.opacity = '1';
                paper.style.transform = 'translateY(0) scale(1)';
            }, 50);

            setTimeout(() => {
                resetBtn.style.display = 'block';
                setTimeout(() => { resetBtn.style.opacity = '1'; }, 50);
            }, 400);

        }, 350);
    }

    function resetCookie() {
        isCracked = false;
        
        const wrapper = document.getElementById('cookie-wrapper');
        const topHalf = document.getElementById('top-half');
        const bottomHalf = document.getElementById('bottom-half');
        const paper = document.getElementById('paper-fortune');
        const instruction = document.getElementById('instruction');
        const resetBtn = document.getElementById('reset-btn');

        paper.style.opacity = '0';
        paper.style.transform = 'translateY(20px) scale(0.9)';
        resetBtn.style.opacity = '0';
        
        setTimeout(() => {
            paper.style.display = 'none';
            resetBtn.style.display = 'none';
            
            // Restore structural visibility safely
            wrapper.style.display = 'block';
            topHalf.classList.remove('split-top');
            bottomHalf.classList.remove('split-bottom');
            instruction.innerText = "Tap the cookie to crack it open...";
            
            // Re-engage flight parameters
            wrapper.classList.add('wobble');
        }, 300);
    }
</script>

</body>
</html>
