<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune Cookieee</title>
    <style>
        :root {
            --bg-color: #fcf8f2;
            --card-bg: #ffffff;
            --text-main: #33231a;
            --text-sub: #7a685d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #game-card {
            background: var(--card-bg);
            padding: 40px 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(138, 91, 56, 0.08);
            width: 90%;
            max-width: 380px;
            box-sizing: border-box;
            text-align: center;
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        #instruction {
            color: var(--text-sub);
            font-size: 14px;
            margin-bottom: 40px;
            font-weight: 500;
            min-height: 20px;
        }

        /* --- COOKIE CONTAINER --- */
        #cookie-wrapper {
            width: 170px;
            height: 130px;
            margin: 0 auto 30px auto;
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.4s ease;
        }

        .cookie-half {
            width: 85px;
            height: 130px;
            position: absolute;
            top: 0;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
        }

        #left {
            left: 0;
            transform-origin: left center;
        }

        #right {
            right: 0;
            transform-origin: right center;
        }

        /* Gentle Floating Animation */
        .wobble {
            animation: floatWobble 2.5s ease-in-out infinite;
        }

        @keyframes floatWobble {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(1.5deg); }
        }

        /* Flipped & Angled Break Transitions */
        .crack-left {
            transform: translateX(-60px) rotate(-35deg) scale(0.85);
            opacity: 0.25;
        }
        .crack-right {
            transform: translateX(60px) rotate(35deg) scale(0.85);
            opacity: 0.25;
        }

        /* --- THE PAPERS SLIP --- */
        #paper-fortune {
            width: 85%;
            background: #ffffff;
            border-top: 2px dashed #e74c3c;
            border-bottom: 2px dashed #e74c3c;
            box-shadow: 0 5px 15px rgba(0,0,0,0.06);
            padding: 22px 15px;
            box-sizing: border-box;
            margin: 10px auto 0 auto;
            display: none;
            text-align: center;
            opacity: 0;
            transform: translateY(-30px) scale(0.9);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #fortune-text {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.5;
            color: #c0392b;
            margin: 0 0 6px 0;
        }

        .fortune-subtext {
            font-size: 11px;
            color: #7f8c8d;
            letter-spacing: 0.5px;
        }

        /* --- RESET BUTTON --- */
        #reset-btn {
            background-color: var(--text-main);
            color: white;
            border: none;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            display: none;
            opacity: 0;
            transition: all 0.3s ease;
        }
        #reset-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div id="game-card">
    <h2>Lucky Cookie</h2>
    <div id="instruction">Tap the cookie to crack it open...</div>

    <div id="cookie-wrapper" class="wobble" onclick="crackCookie()">
        
        <div class="cookie-half" id="left">
            <svg viewBox="0 0 85 130" width="100%" height="100%">
                <path d="M85,15 C50,12 15,25 8,65 C2,100 20,125 45,122 C40,100 45,75 85,60 Z" fill="#f4ce80"/>
                <path d="M85,60 C45,75 40,100 45,122 C30,115 18,95 20,70 C22,55 50,62 85,60 Z" fill="#ddac4f" opacity="0.45"/>
                <path d="M85,15 C55,12 25,24 15,45 C28,35 55,25 85,25 Z" fill="#fff" opacity="0.25"/>
                <line x1="84" y1="15" x2="84" y2="60" stroke="#d5a03b" stroke-width="1.5" opacity="0.6"/>
            </svg>
        </div>
        
        <div class="cookie-half" id="right">
            <svg viewBox="0 0 85 130" width="100%" height="100%">
                <path d="M0,15 C35,12 70,25 77,65 C83,100 65,125 40,122 C45,100 40,75 0,60 Z" fill="#e9bf6a"/>
                <path d="M0,60 C40,75 45,100 40,122 C55,115 67,95 65,70 C63,55 35,62 0,60 Z" fill="#ca9631" opacity="0.55"/>
                <path d="M0,15 C30,12 60,24 70,45 C57,35 30,25 0,25 Z" fill="#fff" opacity="0.18"/>
            </svg>
        </div>
        
    </div>

    <div id="paper-fortune">
        <div id="fortune-text"></div>
        <div class="fortune-subtext">Lucky Numbers: 7, 11, 22, 44</div>
    </div>

    <button id="reset-btn" onclick="resetCookie()">Get Another Cookie</button>
</div>

<script {RULE_1}>
    let isCracked = false;

    function crackCookie() {
        if (isCracked) return;
        isCracked = true;

        const wrapper = document.getElementById('cookie-wrapper');
        const leftSide = document.getElementById('left');
        const rightSide = document.getElementById('right');
        const paper = document.getElementById('paper-fortune');
        const instruction = document.getElementById('instruction');
        const resetBtn = document.getElementById('reset-btn');

        wrapper.classList.remove('wobble');
        leftSide.classList.add('crack-left');
        rightSide.classList.add('crack-right');
        instruction.innerText = "Your morning fortune:";

        setTimeout(() => {
            const fortunes = [
                "I love you Monkey 💗 ",
                "Have an amazing day today! I love youuu!",
                "Roses are red, violets are blue, you have to look at a laptop all day, but at least you're super cute 😉",
                "You're my favoritest person in the whole world. Have an amazing day bubbas!"
            ];
            
            const randomFortune = fortunes[Math.floor(Math.random() * fortunes.length)];
            document.getElementById('fortune-text').innerText = randomFortune;

            paper.style.display = 'block';
            setTimeout(() => {
                paper.style.opacity = '1';
                paper.style.transform = 'translateY(0) scale(1)';
            }, 50);

            setTimeout(() => {
                resetBtn.style.display = 'block';
                setTimeout(() => { resetBtn.style.opacity = '1'; }, 50);
            }, 400);

        }, 350);
    }

    function resetCookie() {
        isCracked = false;
        
        const wrapper = document.getElementById('cookie-wrapper');
        const leftSide = document.getElementById('left');
        const rightSide = document.getElementById('right');
        const paper = document.getElementById('paper-fortune');
        const instruction = document.getElementById('instruction');
        const resetBtn = document.getElementById('reset-btn');

        paper.style.opacity = '0';
        paper.style.transform = 'translateY(-30px) scale(0.9)';
        resetBtn.style.opacity = '0';
        
        setTimeout(() => {
            paper.style.display = 'none';
            resetBtn.style.display = 'none';
            
            leftSide.classList.remove('crack-left');
            rightSide.classList.remove('crack-right');
            instruction.innerText = "Tap the cookie to crack it open...";
            
            wrapper.classList.add('wobble');
        }, 300);
    }
</script>

</body>
</html>
