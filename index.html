<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune Cookieee</title>
    <style>
        :root {
            --bg-color: #fcf8f2;
            --card-bg: #ffffff;
            --text-main: #33231a;
            --text-sub: #7a685d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #game-card {
            background: var(--card-bg);
            padding: 40px 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(138, 91, 56, 0.08);
            width: 90%;
            max-width: 380px;
            box-sizing: border-box;
            text-align: center;
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        #instruction {
            color: var(--text-sub);
            font-size: 14px;
            margin-bottom: 40px;
            font-weight: 500;
            min-height: 20px;
        }

        /* --- COOKIE WRAPPER --- */
        #cookie-wrapper {
            width: 180px;
            height: 120px;
            margin: 0 auto 30px auto;
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.4s ease;
        }

        .cookie-half {
            width: 90px;
            height: 120px;
            position: absolute;
            top: 0;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
        }

        #left {
            left: 0;
            transform-origin: left center;
        }

        #right {
            right: 0;
            transform-origin: right center;
        }

        .wobble {
            animation: floatWobble 2.5s ease-in-out infinite;
        }

        @keyframes floatWobble {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(1deg); }
        }

        /* Straight pull-apart break */
        .crack-left {
            transform: translateX(-65px) rotate(-15deg);
            opacity: 0;
        }
        .crack-right {
            transform: translateX(65px) rotate(15deg);
            opacity: 0;
        }

        /* --- FORTUNE SLIP --- */
        #paper-fortune {
            width: 85%;
            background: #ffffff;
            border-top: 2px dashed #e74c3c;
            border-bottom: 2px dashed #e74c3c;
            box-shadow: 0 5px 15px rgba(0,0,0,0.06);
            padding: 22px 15px;
            box-sizing: border-box;
            margin: 10px auto 0 auto;
            display: none;
            text-align: center;
            opacity: 0;
            transform: translateY(-20px) scale(0.95);
            transition: all 0.5s ease-out;
        }

        #fortune-text {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.5;
            color: #c0392b;
            margin: 0 0 6px 0;
        }

        .fortune-subtext {
            font-size: 11px;
            color: #7f8c8d;
            letter-spacing: 0.5px;
        }

        /* --- BUTTON --- */
        #reset-btn {
            background-color: var(--text-main);
            color: white;
            border: none;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            display: none;
            opacity: 0;
            transition: all 0.3s ease;
        }
        #reset-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div id="game-card">
    <h2>Lucky Cookie</h2>
    <div id="instruction">Tap the cookie to crack it open...</div>

    <div id="cookie-wrapper" class="wobble" onclick="crackCookie()">
        
        <!-- Sharp Geometric Left Half -->
        <div class="cookie-half" id="left">
            <svg viewBox="0 0 90 120" width="100%" height="100%">
                <!-- Main wing panel -->
                <polygon points="90,10 50,20 10,65 35,110 55,95 90,55" fill="#f4ce80" />
                <!-- Bottom sharp tip highlight/crease -->
                <polygon points="35,110 55,95 90,55 70,52 45,75" fill="#ddac4f" />
                <!-- Top edge facet -->
                <polygon points="90,10 50,20 65,40 90,30" fill="#fff" opacity="0.25" />
                <!-- Center seam facet -->
                <polygon points="90,10 90,55 70,52" fill="#e2b75f" />
            </svg>
        </div>
        
        <!-- Sharp Geometric Right Half -->
        <div class="cookie-half" id="right">
            <svg viewBox="0 0 90 120" width="100%" height="100%">
                <!-- Main wing panel -->
                <polygon points="0,10 40,20 80,65 55,110 35,95 0,55" fill="#e9bf6a" />
                <!-- Bottom sharp tip highlight/crease -->
                <polygon points="55,110 35,95 0,55 20,52 45,75" fill="#ca9631" />
                <!-- Top edge facet -->
                <polygon points="0,10 40,20 25,40 0,30" fill="#fff" opacity="0.18" />
                <!-- Center seam facet -->
                <polygon points="0,10 0,55 20,52" fill="#cca043" />
            </svg>
        </div>
        
    </div>

    <div id="paper-fortune">
        <div id="fortune-text"></div>
        <div class="fortune-subtext">Lucky Numbers: 7, 11, 22, 44</div>
    </div>

    <button id="reset-btn" onclick="resetCookie()">Get Another Cookie</button>
</div>

<script>
    let isCracked = false;

    function crackCookie() {
        if (isCracked) return;
        isCracked = true;

        const wrapper = document.getElementById('cookie-wrapper');
        const leftSide = document.getElementById('left');
        const rightSide = document.getElementById('right');
        const paper = document.getElementById('paper-fortune');
        const instruction = document.getElementById('instruction');
        const resetBtn = document.getElementById('reset-btn');

        wrapper.classList.remove('wobble');
        leftSide.classList.add('crack-left');
        rightSide.classList.add('crack-right');
        instruction.innerText = "Your morning fortune:";

        setTimeout(() => {
            const fortunes = [
                "I love you Monkey 💗 ",
                "Have an amazing day today! I love youuu!",
                "Roses are red, violets are blue, you have to look at a laptop all day, but at least you're super cute 😉",
                "You're my favoritest person in the whole world. Have an amazing day bubbas!"
            ];
            
            const randomFortune = fortunes[Math.floor(Math.random() * fortunes.length)];
            document.getElementById('fortune-text').innerText = randomFortune;

            paper.style.display = 'block';
            setTimeout(() => {
                paper.style.opacity = '1';
                paper.style.transform = 'translateY(0) scale(1)';
            }, 50);

            setTimeout(() => {
                resetBtn.style.display = 'block';
                setTimeout(() => { resetBtn.style.opacity = '1'; }, 50);
            }, 400);

        }, 300);
    }

    function resetCookie() {
        isCracked = false;
        
        const wrapper = document.getElementById('cookie-wrapper');
        const leftSide = document.getElementById('left');
        const rightSide = document.getElementById('right');
        const paper = document.getElementById('paper-fortune');
        const instruction = document.getElementById('instruction');
        const resetBtn = document.getElementById('reset-btn');

        paper.style.opacity = '0';
        paper.style.transform = 'translateY(-20px) scale(0.95)';
        resetBtn.style.opacity = '0';
        
        setTimeout(() => {
            paper.style.display = 'none';
            resetBtn.style.display = 'none';
            
            leftSide.classList.remove('crack-left');
            rightSide.classList.remove('crack-right');
            instruction.innerText = "Tap the cookie to crack it open...";
            
            wrapper.classList.add('wobble');
        }, 300);
    }
</script>

</body>
</html>
