<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune Cookieee</title>
    <style>
        :root {
            --bg-color: #fcf8f2;
            --card-bg: #ffffff;
            --text-main: #33231a;
            --text-sub: #7a685d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #game-card {
            background: var(--card-bg);
            padding: 40px 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(138, 91, 56, 0.08);
            width: 90%;
            max-width: 380px;
            box-sizing: border-box;
            text-align: center;
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        #instruction {
            color: var(--text-sub);
            font-size: 14px;
            margin-bottom: 35px;
            font-weight: 500;
            min-height: 20px;
        }

        /* --- COOKIE DISK PLAYER --- */
        #cookie-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px auto;
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        #cookie-emoji {
            font-size: 90px;
            line-height: 1;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
        }

        /* Idle Floating Bouncing Movement */
        .wobble {
            animation: floatWobble 2.5s ease-in-out infinite;
        }

        @keyframes floatWobble {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.03); }
        }

        /* Exploding/Cracking Break Effect */
        .cookie-break {
            transform: scale(1.4) rotate(15deg);
            opacity: 0;
        }

        /* --- THE REALISTIC PAPERS SLIP --- */
        #paper-fortune {
            width: 90%;
            background: #ffffff;
            border-top: 2px dashed #e74c3c;
            border-bottom: 2px dashed #e74c3c;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            padding: 25px 18px;
            box-sizing: border-box;
            margin: 0 auto;
            display: none;
            text-align: center;
            opacity: 0;
            transform: translateY(20px) scale(0.9);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #fortune-text {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.5;
            color: #c0392b;
            margin: 0 0 8px 0;
        }

        .fortune-subtext {
            font-size: 11px;
            color: #7f8c8d;
            letter-spacing: 0.5px;
        }

        /* --- SYSTEM TRIGGER ACTION BUTTON --- */
        #reset-btn {
            background-color: var(--text-main);
            color: white;
            border: none;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 30px;
            display: none;
            opacity: 0;
            transition: all 0.3s ease;
        }
        #reset-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div id="game-card">
    <h2>Lucky Cookie</h2>
    <div id="instruction">Tap the cookie to crack it open...</div>

    <div id="cookie-container" onclick="crackCookie()">
        <div id="cookie-emoji" class="wobble">🥠</div>
    </div>

    <div id="paper-fortune">
        <div id="fortune-text"></div>
        <div class="fortune-subtext">Lucky Numbers: 7, 11, 22, 44</div>
    </div>

    <button id="reset-btn" onclick="resetCookie()">Get Another Cookie</button>
</div>

<script>
    let isCracked = false;

    function crackCookie() {
        if (isCracked) return;
        isCracked = true;

        const cookie = document.getElementById('cookie-emoji');
        const paper = document.getElementById('paper-fortune');
        const instruction = document.getElementById('instruction');
        const resetBtn = document.getElementById('reset-btn');

        // Pop open animation styling
        cookie.classList.remove('wobble');
        cookie.classList.add('cookie-break');
        instruction.innerText = "Your morning fortune:";

        setTimeout(() => {
            // Your custom dynamic text pool
            const fortunes = [
                "I love you Monkey 💗 ",
                "Have an amazing day today! I love youuu!",
                "Roses are red, violets are blue, you have to look at a laptop all day, but at least you're super cute 😉",
                "You're my favoritest person in the whole world. Have an amazing day bubbas!"
            ];
            
            const randomFortune = fortunes[Math.floor(Math.random() * fortunes.length)];
            document.getElementById('fortune-text').innerText = randomFortune;

            // Slide out paper slip seamlessly
            document.getElementById('cookie-container').style.display = 'none';
            paper.style.display = 'block';
            
            setTimeout(() => {
                paper.style.opacity = '1';
                paper.style.transform = 'translateY(0) scale(1)';
            }, 50);

            // Transition control for restart panel
            setTimeout(() => {
                resetBtn.style.display = 'block';
                setTimeout(() => { resetBtn.style.opacity = '1'; }, 50);
            }, 400);

        }, 350);
    }

    function resetCookie() {
        isCracked = false;
        
        const cookie = document.getElementById('cookie-emoji');
        const paper = document.getElementById('paper-fortune');
        const instruction = document.getElementById('instruction');
        const resetBtn = document.getElementById('reset-btn');

        paper.style.opacity = '0';
        paper.style.transform = 'translateY(20px) scale(0.9)';
        resetBtn.style.opacity = '0';
        
        setTimeout(() => {
            paper.style.display = 'none';
            resetBtn.style.display = 'none';
            
            // Bring cookie container layout structure back up
            document.getElementById('cookie-container').style.display = 'flex';
            cookie.classList.remove('cookie-break');
            instruction.innerText = "Tap the cookie to crack it open...";
            
            // Re-engage floating loop
            cookie.classList.add('wobble');
        }, 300);
    }
</script>

</body>
</html>
